import org.apache.tools.ant.filters.ReplaceTokens

/* Define the gradle plugins. */
plugins {
    id "java"
    id "idea"

    // Used to get info from git.
    id "com.palantir.git-version" version "3.1.0"

    // Used to check coding style.
    id 'checkstyle'

    // Used for pre-processor.
    id "systems.manifold.manifold-gradle-plugin" version "0.0.2-alpha"
}

/* Configure the checkstyle gradle plugin. */
checkstyle {
    configFile = project.rootProject.file("checkstyle.xml")
    toolVersion = '10.18.0'
}

/* Configure Pre-Processor. */
def writeBuildGradlePredefine(List<String> mcVers, int mcIndex)
{
    // Build the list of preprocessors to use
    StringBuilder sb = new StringBuilder();

    sb.append("# DON'T TOUCH THIS FILE, This is handled by the build script\n");


    for (int i = 0; i < mcVers.size(); i++)
    {
        String verStr = mcVers[i].replace(".", "_");
        sb.append("MC_" + verStr + "=" + i.toString() + "\n");

        if (mcIndex == i)
            sb.append("MC_VER=" + i.toString() + "\n");
    }


    // Check if this is a development build
    if (mod_version.toLowerCase().contains("dev"))
    {
        // WARNING: only use this for logging, we don't want to have confusion
        // when a method doesn't work correctly in the release build.
        sb.append("DEV_BUILD=\n");
    }

    new File(projectDir, "build.properties").text = sb.toString()
}

// Transfers the values set in settings.gradle to the rest of the project
project.gradle.ext.getProperties().each { prop ->
    rootProject.ext.set(prop.key, prop.value)
//    println "Added prop [key:" + prop.key + ", value:" + prop.value + "]"
}

// Sets up manifold stuff
writeBuildGradlePredefine(rootProject.mcVers, rootProject.mcIndex)

/* Define top-level props */
group = project.maven_group

/* Configure shared parts for each sub project. */
subprojects { p ->

    /* Configure manifold gradle plugin. */
    apply plugin: "systems.manifold.manifold-gradle-plugin"
    manifold {
        manifoldVersion = rootProject.manifold_version
    }

    /* Configure dependencies. */
    dependencies {
        annotationProcessor("systems.manifold:manifold-preprocessor:${rootProject.manifold_version}")
        testAnnotationProcessor("systems.manifold:manifold-preprocessor:${rootProject.manifold_version}")
    }

}

/* Configure for all projects. */
allprojects { p ->
    apply plugin: "java"
    apply plugin: "maven-publish"

    repositories {
        // The central repo.
        mavenCentral()

        maven { url "https://s01.oss.sonatype.org/content/repositories/snapshots/" }

        // For manifold preprocessor.
        maven { url "https://oss.sonatype.org/content/repositories/snapshots" }

        maven { url "https://jitpack.io" }
        maven { url "https://projectlombok.org/edge-releases" }

        // VanillaGradle and Mixins in common module.
        maven { url "https://repo.spongepowered.org/maven/" }
    }

    /* Define the version string. */
    def gitVersionDetails = versionDetails()
    // must starts with sem-ver to make the fabric loader happy
    version = "${project.mod_version}-${gitVersionDetails.gitHash}-mc${project.minecraft_version}"

    /* Copy accesswidener file. */
    task copyCommonLoaderResources(type: Copy) {
        from project(":common").file("src/main/resources/${access_widener_version}.fuji.accesswidener")
        into(file(p.file("build/resources/main")))
        rename "${access_widener_version}.fuji.accesswidener", "fuji.accesswidener"

    }
}


/* Rename the LICENSE file in jar. */
jar {
    from("LICENSE") {
        rename { "${it}" }
    }
}

/* Configure Publishing. */
publishing {

    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }

    // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
    repositories {}
}

/* Configure Latex Compiler */
def processTexDir = file("${layout.buildDirectory.get()}/processTeX")

def outputTexDir = file("${layout.buildDirectory.get()}/outTeX")
def outputTexFile = "fuji.pdf"

def docsDir = file("$projectDir/docs")

def recreateDir(File dir) {
    if (dir.exists()) {
        println "Delete existing directory: $dir"
        dir.deleteDir()
    }
    println "Mkdir the directory: $dir"
    dir.mkdirs()
}

tasks.register('processLatex', Copy) {
    outputs.upToDateWhen { false }

    // clean
    doFirst {
        recreateDir(processTexDir)
    }

    // copy
    from(docsDir)
    into("${processTexDir}")
    include "**/*.tex"

    filter(ReplaceTokens, tokens: [
            'TOKEN_MOD_VERSION' : project.version.toString(),
            'TOKEN_PROJECT_ROOT': project.rootDir.absolutePath,
            'TOKEN_TEX_OUT_DIR' : outputTexDir.toString()
    ])
}

tasks.register('compileLatex') {
    doFirst {
        recreateDir(outputTexDir)
    }

    doLast {
        2.times {
            exec {
                workingDir = processTexDir
                commandLine "pdflatex",
                        "-file-line-error",
                        "-interaction=nonstopmode",
                        "-synctex=1",
                        "-output-format=pdf",
                        "-output-directory=${outputTexDir}",
                        "-shell-escape",
                        "fuji.tex"
                println("Compile TeX once.")
            }
        }
        println 'Finish the loop of compiling TeX.'

        copy {
            from("${outputTexDir}/${outputTexFile}")
            into("${docsDir}/release")
        }
    }
}
tasks.compileLatex.dependsOn(processLatex)

