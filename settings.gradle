/* Define the repositories for the project. */
pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

/* Include child projects. */
include("fabric")


/* Define the name of root project. */
rootProject.name = 'fuji'

